spring.application.name=clinic-management

# 1. DATABASE CONFIGURATION (Using Environment Variables for Security)
# Render will look for these names in its "Environment" tab

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 2. JPA / HIBERNATE SETTINGS
# 'update' is fine for development, but ensures tables are created/updated
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect


# 3. SERVER SETTINGS
# This is CRITICAL for Render to bind the port correctly
server.port=${PORT:8080}

# 4. FILE UPLOADS
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# 5. STATIC RESOURCES (For images/icons)
spring.web.resources.static-locations=classpath:/static/,file:uploads/

# 6. LOGGING (Keeping it clean)
logging.level.org.hibernate.orm.connections.pooling=ERROR
logging.level.org.hibernate.orm.deprecation=ERROR
logging.level.com.zaxxer.hikari=ERROR
# Keep Security DEBUG on for now so you can troubleshoot login issues in Render logs
logging.level.org.springframework.security=DEBUG
spring.jpa.open-in-view=false

